<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1a5fb4"/>

  <!-- Central staff / pillar -->
  <rect x="31" y="12" width="2" height="36" rx="1" fill="white"/>

  <!-- Top crossbeam -->
  <rect x="14" y="18" width="36" height="2.5" rx="1.25" fill="white"/>

  <!-- Left pan chain -->
  <line x1="19" y1="20.5" x2="19" y2="31" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right pan chain -->
  <line x1="45" y1="20.5" x2="45" y2="31" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Left pan (shallow arc) -->
  <path d="M13 31 Q19 36.5 25 31" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Right pan (shallow arc  slightly lower to show balance in motion) -->
  <path d="M39 33 Q45 38.5 51 33" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Base / plinth -->
  <rect x="24" y="47" width="16" height="3" rx="1.5" fill="white"/>
  <rect x="27" y="43" width="10" height="4.5" rx="1" fill="white" opacity="0.85"/>
</svg>
